global:
  timezone: "UTC"
  db_path: "~/social_scanner/state.db"
  output_html: "~/social_scanner/rendered/index.html"
  max_items_per_subreddit: 50
  max_claude_batch_size: 20
  min_score: 10
  min_comments: 5
  item_age_limit_hours: 72
  claude_model: "claude-sonnet-4-6"
  claude_max_tokens: 4096
  reddit_request_delay_seconds: 1.0
  book_list_path: "~/git/kvasir_proto/src/html/kvasir.pub/book-list.txt"

subreddits:
  # Books / reading
  - name: books
    enabled: true
  - name: bookclub
    enabled: true
  - name: suggestmeabook
    enabled: true
  - name: classics
    enabled: true
  - name: literature
    enabled: true
  - name: 52book
    enabled: true
  - name: booksuggestions
    enabled: true
  - name: whattoreadwhen
    enabled: true
  # Specific authors / classic literature
  - name: dostoevsky
    enabled: true
  - name: Sherlock
    enabled: true
  # AI / tech
  - name: ChatGPT
    enabled: true
  - name: artificial
    enabled: true
  - name: SideProject
    enabled: true
  # Education / teaching
  - name: Teachers
    enabled: true
  - name: homeschool
    enabled: true
  # Games / quiz (→ suggest quizly.pub main site)
  - name: trivia
    enabled: true
  - name: wordgames
    enabled: true
  - name: boardgames
    enabled: true
  - name: rpg
    enabled: true
  - name: puzzles
    enabled: true
  # Russian-language communities
  - name: ru
    enabled: true
  - name: RussianLiterature
    enabled: true

twitter_searches:
  # Books / reading discovery
  - query: "book quiz OR book club discussion OR what should I read"
    enabled: true
  - query: "interactive reading OR AI reading app OR book recommendations app"
    enabled: true
  # AI-assisted learning
  - query: "AI for learning OR interactive learning app OR AI education tool"
    enabled: true
  # Literary / classics
  - query: "classic literature discussion OR literary quiz OR great books"
    enabled: true
  # Teaching / classroom
  - query: "AI classroom tool OR EdTech reading OR book quiz for students"
    enabled: false

include_keywords:
  # Core Quizly topics
  - ai book
  - book quiz
  - literature quiz
  - book club
  - reading discussion
  - discussion questions
  - classics discussion
  - ai for teachers
  - ai classroom
  - trivia game
  - word game
  - character chat
  - ai reading
  - interactive learning
  - book recommendations
  - book challenge
  - reading app
  - ai tools
  - book summary
  - what should i read
  - how to learn
  - recommend
  - quiz
  - literary
  # Game / quiz community signals
  - trivia night
  - board game
  - tabletop game
  - quiz night
  - pub quiz
  # Russian keywords
  - книга
  - книги
  - книжный клуб
  - литература
  - чтение
  - читать
  - что почитать
  - классика
  - обсуждение книг
  - рекомендации книг
  - квиз
  - данетки
  - викторина
  - интерактивное обучение
  - ИИ для

exclude_keywords:
  - porn
  - nsfw
  - onlyfans
  - leaked
  - piracy
