# Quizly Reading Hall — available books catalog
# Source: kvasir_proto book-list.txt
#
# Used by the opportunity scanner to detect when a thread mentions a book
# or author available on the platform, and inject a relevant link.

reading_hall_url: "https://quizly.pub/books"
quizly_url: "https://quizly.pub"

# Reading Hall CTA text (used in recommendations when a book is mentioned)
reading_hall_cta: >
  you can read the book, discuss it with our AI adviser, generate a video on
  the book, and take part in contests — all at quizly.pub/books

# Game / quiz subreddits — suggest quizly.pub (main site) instead of /books
game_subreddits:
  - trivia
  - wordgames
  - boardgames
  - rpg
  - tabletopgaming
  - puzzles
  - quizzes
  - AskReddit   # quiz-like discussion threads
  - CasualConversation

