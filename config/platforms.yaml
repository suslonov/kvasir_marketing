scan_interval_minutes: 10

platforms:
  reddit:
    enabled: true
    collector: reddit_browser
    browser_profile_dir: ~/.kvasir/browser_profiles/reddit_profile
    headless: true
    max_posts_per_target: 12
    max_targets_per_run: 8   # random sample size per pipeline run
    inter_request_delay_min: 2.0   # seconds — random sleep between targets
    inter_request_delay_max: 5.0
    max_consecutive_failures: 3    # exclude target after this many empty runs in a row
    discovery:
      enabled: true
      inter_request_delay_min: 2.0
      inter_request_delay_max: 4.0
      min_subscribers: 5000
      queries:
        - "books reading literature"
        - "ai learning education"
        - "quiz trivia games"
        - "classic literature"
        - "book recommendations"
        - "interactive learning"
    targets:
      - type: subreddit:hot
        value: books
      - type: subreddit:hot
        value: suggestmeabook
      - type: subreddit:new
        value: ChatGPT
      - type: subreddit:new
        value: singularity
      - type: subreddit:hot
        value: artificial
      - type: subreddit:hot
        value: Teachers
      - type: subreddit:hot
        value: homeschool
      - type: subreddit:hot
        value: literature
      - type: subreddit:new
        value: SideProject
      - type: subreddit:search
        value: "quiz app"
      - type: subreddit:search
        value: "books ai"
      - type: subreddit:search
        value: "interactive reading"
      # Author / book-specific subreddits
      - type: subreddit:hot
        value: dostoevsky
      - type: subreddit:hot
        value: Sherlock
      - type: subreddit:hot
        value: booksuggestions
      # Game / quiz subreddits (→ link to quizly.pub main site)
      - type: subreddit:hot
        value: boardgames
      - type: subreddit:hot
        value: puzzles
      - type: subreddit:search
        value: "reading quiz"
      - type: subreddit:search
        value: "book discussion AI"

  twitter:
    enabled: false
    collector: twitter
    max_items_per_target: 10
    delay_seconds: 2.0             # sleep between query requests
    targets:
      - type: search
        value: "AI books quiz"
      - type: search
        value: "education startup"
      - type: search
        value: "book recommendations app"
      - type: search
        value: "interactive learning AI"

  youtube:
    enabled: true
    collector: youtube
    max_posts_per_target: 10     # videos per search query
    max_targets_per_run: 5       # random sample per pipeline run
    inter_request_sleep_min: 1.5 # seconds — random sleep between API calls
    inter_request_sleep_max: 3.5
    fetch_top_comment: true      # fetch top comment for each video (costs 1 quota unit each)
    targets:
      # Book / reading discussions
      - type: video_search
        value: "book discussion AI recommendations"
      - type: video_search
        value: "classic literature analysis"
      - type: video_search
        value: "book club video essay"
      - type: video_search
        value: "what should I read next"
      # AI / EdTech
      - type: video_search
        value: "AI reading app review"
      - type: video_search
        value: "interactive learning AI tools"
      - type: video_search
        value: "AI for education students"
      # Quiz / trivia
      - type: video_search
        value: "literary quiz trivia books"
      - type: video_search
        value: "book trivia challenge"
